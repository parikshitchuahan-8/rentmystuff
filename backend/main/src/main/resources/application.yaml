spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

server:
  port: ${PORT:8080}

logging:
  file:
    name: ${LOG_FILE:logs/rentmyapp.log}
  level:
    root: INFO

app:
  upload:
    dir: ${UPLOAD_DIR:uploads}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
