services:
  postgres:
    image: postgres:16
    container_name: rentmystuff-postgres
    environment:
      POSTGRES_DB: rentmyapp
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  app:
    build:
      context: .
    container_name: rentmystuff-api
    depends_on:
      - postgres
    environment:
      SPRING_PROFILES_ACTIVE: prod
      PORT: 8080
      DB_URL: jdbc:postgresql://postgres:5432/rentmyapp
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: change-me-before-sharing
      CORS_ALLOWED_ORIGINS: http://localhost:5173
      UPLOAD_DIR: /app/uploads
      JPA_DDL_AUTO: update
    ports:
      - "8080:8080"
    volumes:
      - app-uploads:/app/uploads
      - app-logs:/app/logs

volumes:
  postgres-data:
  app-uploads:
  app-logs:
